[profile.default]
# Mark test as SLOW after 60s, terminate after 3 consecutive slow periods
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.ci]
# CI: stricter — 30s slow, terminate after 2 periods
slow-timeout = { period = "30s", terminate-after = 2 }

[profile.default.junit]
path = "target/nextest/ci/junit.xml"
