# PR / push 门禁：无需 DEEPSEEK_API_KEY（live 测试均为 #[ignore]）
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # 与 scripts/verify_all.ps1 一致，降低 Windows/macOS linker OOM
  CARGO_BUILD_JOBS: 1

jobs:
  # ── 前端：与 verify_all 一致 ───────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install, build, test
        working-directory: ui
        run: |
          npm ci
          npm run build
          npm test

  # ── Rust 静态检查 + 单元/集成测试（Ubuntu，最快反馈）────────
  rust:
    name: Rust (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-all-crates: true

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace

      - name: clippy (deny unwrap in core crates)
        shell: bash
        run: |
          set -euo pipefail
          for pkg in novel-core novel-knowledge novel-compaction novel-config novel-skills novel-deepseek; do
            echo "=== clippy -p $pkg ==="
            cargo clippy -p "$pkg" -- -D clippy::unwrap_used
          done

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: nextest (workspace + integration)
        run: |
          cargo nextest run --workspace
          cargo nextest run -p novel-integration-tests

  # ── 跨平台测试（仅 main/master push，PR 不跑以省分钟）──────
  rust-matrix:
    name: Rust (${{ matrix.os }})
    if: github.event_name == 'push'
    needs: [rust, frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-all-crates: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: nextest
        run: |
          cargo nextest run --workspace
          cargo nextest run -p novel-integration-tests

  # ── Tauri 壳编译冒烟（不打包；无需图标）────────────────────
  tauri-compile:
    name: Tauri compile smoke
    needs: [rust, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-all-crates: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build frontend for Tauri
        working-directory: ui
        run: npm ci && npm run build

      - name: Install Linux Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: cargo build novel-agent (src-tauri)
        run: cargo build -p novel-agent --manifest-path src-tauri/Cargo.toml

  # ── 依赖安全审计 ───────────────────────────────────────────
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
