# PR / push 门禁：无需 DEEPSEEK_API_KEY（live 测试均为 #[ignore]）
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # 与本地 ci-windows.ps1 / ci-rust-gate 一致，降低 Windows/macOS linker OOM
  CARGO_BUILD_JOBS: 1
  # actions/checkout、setup-node 等 Action 运行时使用 Node 24（见 GitHub 2025-09 Node 20 弃用说明）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 前端：Vitest + build（与 post-change-checklist 步骤 6 一致）──
  frontend:
    name: Frontend (Vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ui/.nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: npm test (no warnings) + build
        run: bash scripts/ci-frontend.sh

  # ── Rust 门禁（三平台同一 scripts/ci-rust-gate.sh）────────────────
  rust:
    name: Rust (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-all-crates: true

      - uses: actions/setup-node@v4
        with:
          node-version-file: ui/.nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Rust gate (ci-rust-gate.sh)
        run: bash scripts/ci-rust-gate.sh

  rust-windows:
    name: Rust (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-all-crates: true

      - uses: actions/setup-node@v4
        with:
          node-version-file: ui/.nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Frontend (Vitest + build)
        shell: bash
        run: bash scripts/ci-frontend.sh

      - name: Rust gate (ci-rust-gate.sh)
        shell: bash
        run: bash scripts/ci-rust-gate.sh

      - name: Security audit
        shell: bash
        run: bash scripts/ci-security-audit.sh

  rust-macos:
    name: Rust (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-all-crates: true

      - uses: actions/setup-node@v4
        with:
          node-version-file: ui/.nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Rust gate (ci-rust-gate.sh)
        run: bash scripts/ci-rust-gate.sh

      - name: Security audit
        run: bash scripts/ci-security-audit.sh

  # ── 依赖安全审计（Ubuntu；Windows/mac 已在各自 rust-* job 内执行）──
  security-audit:
    name: Security audit (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo audit
        run: bash scripts/ci-security-audit.sh
