# PR / push 门禁：无需 DEEPSEEK_API_KEY（live 测试均为 #[ignore]）
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # 与 scripts/verify_all.ps1 一致，降低 Windows/macOS linker OOM
  CARGO_BUILD_JOBS: 1

jobs:
  # ── 前端：Vitest + build（与 post-change-checklist 步骤 6 一致）──
  frontend:
    name: Frontend (Vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: npm test (no warnings) + build
        run: bash scripts/ci-frontend.sh

  # ── Rust 静态检查 + 单元/集成测试（Ubuntu，最快反馈）────────
  rust:
    name: Rust (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-all-crates: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # workspace includes src-tauri; check/clippy/nextest need GTK/WebKit dev libs on Linux.
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: rustfmt + cargo check
        run: bash scripts/ci-rust-static.sh

      - name: clippy (workspace, deny warnings + unwrap_used)
        run: bash scripts/ci-clippy.sh

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: nextest (workspace, CI profile)
        run: bash scripts/ci-rust-test.sh

  # ── Windows 全量门禁（与 scripts/ci-windows-gate.sh / 本地 ci-windows.ps1 一致）──
  rust-windows:
    name: Rust (Windows gate)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-all-crates: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Windows CI gate (ci-windows-gate.sh)
        shell: bash
        run: bash scripts/ci-windows-gate.sh

  # ── 跨平台 nextest（仅 main/master push；Windows 已由 rust-windows 覆盖）──────
  rust-matrix:
    name: Rust (${{ matrix.os }})
    if: github.event_name == 'push'
    needs: [rust, frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-all-crates: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: nextest (workspace, CI profile)
        shell: bash
        run: bash scripts/ci-rust-test.sh

  # ── Tauri 壳编译冒烟（不打包；无需图标）────────────────────
  tauri-compile:
    name: Tauri compile smoke
    needs: [rust, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-all-crates: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Tauri compile smoke
        run: bash scripts/ci-tauri.sh

  # ── 依赖安全审计 ───────────────────────────────────────────
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo audit
        run: bash scripts/ci-security-audit.sh
