# 打 tag v* 或手动 dispatch 触发；无需 API Key
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-all-crates: true

      - uses: actions/setup-node@v4
        with:
          node-version-file: ui/.nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Frontend (Vitest + build)
        run: bash scripts/ci-frontend.sh

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Rust gate (ci-rust-gate.sh)
        run: bash scripts/ci-rust-gate.sh

  build-tauri:
    name: Tauri bundle (${{ matrix.os }})
    needs: gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-all-crates: true

      - uses: actions/setup-node@v4
        with:
          node-version-file: ui/.nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend
        working-directory: ui
        run: npm ci

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Check bundle icons
        id: icons
        shell: bash
        run: |
          if [ -f src-tauri/icons/icon.ico ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::src-tauri/icons/icon.ico missing — release bundle skipped on this runner"
          fi

      - name: Build & upload Tauri release
        if: steps.icons.outputs.present == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: Novel Agent ${{ github.event.inputs.version || github.ref_name }}
          releaseBody: |
            Desktop release for Novel Agent ${{ github.event.inputs.version || github.ref_name }}.

            **Note:** `templates/` and `skills/` must ship beside the binary (same layout as dev).
          releaseDraft: true
          prerelease: false
          args: --verbose

      - name: Compile-only fallback (no icons)
        if: steps.icons.outputs.present != 'true'
        run: |
          npm run build --prefix ui
          cargo build -p novel-agent --manifest-path src-tauri/Cargo.toml --release
