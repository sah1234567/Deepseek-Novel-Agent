threshold = 30
missing = "pessimistic"

# Thin Tauri IPC / spawn glue — business logic lives in session_api, event_payload, dto.
# Test harness / build scripts: nextest runs them; coverage attributes to crates/*/src.
exclude = [
  "**/src-tauri/**",
  "**/tauri/engine_loop.rs",
  "**/tauri/events.rs",
  "**/tauri/mod.rs",
  "**/build.rs",
  "**/tests/**",
  "**/tests/integration/**",
  # Inline #[cfg(test)] modules under src/ (not in LCOV as production paths).
  "**/engine/tests.rs",
  "**/turn/loop/tests.rs",
  "**/db/tests.rs",
]
